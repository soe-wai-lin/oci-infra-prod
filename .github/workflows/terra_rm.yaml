  create_oke_lb_service:
    name: Create OKE LoadBalancer Service
    runs-on: ubuntu-latest
    needs: apply

    env:
      # OKE_CLUSTER_OCID: ${{ needs.apply.outputs.oke_cluster_ocid }}
      # LB_SUBNET_OCID: ${{ needs.apply.outputs.lb_subnet_ocid }}
      # LB_NSG_OCID: ${{ needs.apply.outputs.lb_nsg_ocid }}
      # LB_RESERVED_PUBLIC_IP_OCID: ${{ needs.apply.outputs.lb_reserved_public_ip_ocid }}

      OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
      OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_REGION: ${{ secrets.OCI_REGION }}
      OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
      OCI_PRIVATE_KEY_PASSPHRASE: ${{ secrets.OCI_PRIVATE_KEY_PASSPHRASE }}

    steps:
      - name: Download RM outputs artifact
        uses: actions/download-artifact@v4
        with:
          name: rm_outputs

      - name: List download file
        run: | 
          pwd
          ls -al

      - name: Parse RM outputs
        shell: bash
        run: |
          set -euo pipefail

          OKE_CLUSTER_OCID=$(jq -r '.data.items[] | select(."output-name"=="oke_cluster_ocid") | ."output-value"' rm_outputs.json)
          LB_SUBNET_OCID=$(jq -r '.data.items[] | select(."output-name"=="lb_subnet_ocid") | ."output-value"' rm_outputs.json)
          LB_NSG_OCID=$(jq -r '.data.items[] | select(."output-name"=="lb_nsg_ocid") | ."output-value"' rm_outputs.json)
          LB_RESERVED_PUBLIC_IP_OCID=$(jq -r '.data.items[] | select(."output-name"=="lb_reserved_public_ip_ocid") | ."output-value"' rm_outputs.json)

          for v in OKE_CLUSTER_OCID LB_SUBNET_OCID LB_NSG_OCID LB_RESERVED_PUBLIC_IP_OCID; do
            val="${!v:-}"
            if [ -z "${val}" ] || [ "${val}" = "null" ]; then
              echo "::error::${v} is empty or null"
              exit 1
            fi
          done

          echo "OKE_CLUSTER_OCID=${OKE_CLUSTER_OCID}" >> "$GITHUB_ENV"
          echo "LB_SUBNET_OCID=${LB_SUBNET_OCID}" >> "$GITHUB_ENV"
          echo "LB_NSG_OCID=${LB_NSG_OCID}" >> "$GITHUB_ENV"
          echo "LB_RESERVED_PUBLIC_IP_OCID=${LB_RESERVED_PUBLIC_IP_OCID}" >> "$GITHUB_ENV"


      # - name: Load infra outputs
      #   shell: bash
      #   run: |
      #     set -euo pipefail
      #     cat infra-outputs.env
      #     source infra-outputs.env

      #     echo "OKE_CLUSTER_OCID=${OKE_CLUSTER_OCID}" >> "$GITHUB_ENV"
      #     echo "LB_SUBNET_OCID=${LB_SUBNET_OCID}" >> "$GITHUB_ENV"
      #     echo "LB_NSG_OCID=${LB_NSG_OCID}" >> "$GITHUB_ENV"
      #     echo "LB_RESERVED_PUBLIC_IP_OCID=${LB_RESERVED_PUBLIC_IP_OCID}" >> "$GITHUB_ENV"

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install OCI CLI
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install oci-cli

      - name: Configure OCI CLI
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p ~/.oci
          chmod 700 ~/.oci

          printf '%s\n' "${OCI_PRIVATE_KEY}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=${OCI_USER_OCID}
          tenancy=${OCI_TENANCY_OCID}
          region=${OCI_REGION}
          fingerprint=${OCI_FINGERPRINT}
          pass_phrase=${OCI_PRIVATE_KEY_PASSPHRASE}
          key_file=${HOME}/.oci/oci_api_key.pem
          EOF

          chmod 600 ~/.oci/config

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Create kubeconfig for OKE
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.kube"

          oci ce cluster create-kubeconfig \
            --cluster-id "${OKE_CLUSTER_OCID}" \
            --file "$HOME/.kube/config" \
            --region "${OCI_REGION}" \
            --token-version 2.0.0 \
            --kube-endpoint PRIVATE_ENDPOINT \
            --overwrite

          export KUBECONFIG="$HOME/.kube/config"
          kubectl get nodes

      - name: Apply DevOps-managed LoadBalancer Service
        shell: bash
        run: |
          set -euo pipefail
          export KUBECONFIG="$HOME/.kube/config"

          cat <<EOF > oke-lb-service.yaml
          apiVersion: v1
          kind: Service
          metadata:
            name: myapp-lb
            namespace: platform-apps
            annotations:
              oci.oraclecloud.com/load-balancer-type: "lb"
              service.beta.kubernetes.io/oci-load-balancer-subnet1: "${LB_SUBNET_OCID}"
              oci.oraclecloud.com/oci-network-security-groups: "${LB_NSG_OCID}"
              oci.oraclecloud.com/reserved-ips: '["${LB_RESERVED_PUBLIC_IP_OCID}"]'
              service.beta.kubernetes.io/oci-load-balancer-security-list-management-mode: "None"
              service.beta.kubernetes.io/oci-load-balancer-shape: "flexible"
              service.beta.kubernetes.io/oci-load-balancer-shape-flex-min: "10"
              service.beta.kubernetes.io/oci-load-balancer-shape-flex-max: "100"
          spec:
            type: LoadBalancer
            selector:
              app: myapp
            ports:
              - name: http
                port: 80
                targetPort: 80
              - name: https
                port: 443
                targetPort: 80
            selector:
              app: cake
          EOF

          kubectl create namespace platform-apps --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f oke-lb-service.yaml
          kubectl get svc -n platform-apps myapp-lb -o wide

   





name: OCI Resource Manager Manual Apply

on:
  workflow_dispatch:
    inputs:
      stack_id:
        description: "OCI Resource Manager Stack OCID"
        required: true
        type: string
      upgrade_provider:
        description: "Upgrade provider versions during plan/apply"
        required: false
        default: false
        type: boolean
      environment_name:
        description: "GitHub Environment name used for manual approval"
        required: false
        default: "prod-oci-infra-apply"
        type: string

permissions:
  contents: read

jobs:
  plan:
    name: Create PROD OCI Infra Resource Manager Plan
    runs-on: ubuntu-latest
    ## We can use Job level output to carry different job level, but if this output include sensitive datas like secrets,
    ## Cannot carry this output to different job. That's why in this case, use upload "plan_job_id" in Plan Job , and 
    ## download "plan_job_id" from Apply Job.cancel-timeout-minutes: 

    # outputs:
    #   plan_job_id: ${{ steps.create_plan.outputs.plan_job_id }}   

    steps:
      - name: Install OCI CLI
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install oci-cli

      - name: Configure OCI CLI
        shell: bash
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_PRIVATE_KEY_PASSPHRASE: ${{ secrets.OCI_PRIVATE_KEY_PASSPHRASE }}
        run: |
          mkdir -p ~/.oci
          chmod 700 ~/.oci

          printf '%s\n' "${OCI_PRIVATE_KEY}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=${OCI_USER_OCID}
          tenancy=${OCI_TENANCY_OCID}
          region=${OCI_REGION}
          fingerprint=${OCI_FINGERPRINT}
          pass_phrase=${OCI_PRIVATE_KEY_PASSPHRASE}
          key_file=${HOME}/.oci/oci_api_key.pem
          EOF

          chmod 600 ~/.oci/config


          # # Optional passphrase if your key is encrypted
          # if [ -n "${OCI_PRIVATE_KEY_PASSPHRASE}" ]; then
          #   echo "pass_phrase=${OCI_PRIVATE_KEY_PASSPHRASE}" >> ~/.oci/config
          # fi


          oci --version

      - name: Create plan job
        id: create_plan
        shell: bash
        run: |
          set -euo pipefail

          STACK_ID="${{ github.event.inputs.stack_id }}"
          UPGRADE="${{ github.event.inputs.upgrade_provider }}"

          PLAN_JOB_ID=$(oci resource-manager job create-plan-job \
            --stack-id "${STACK_ID}" \
            --display-name "gha-plan-${GITHUB_RUN_NUMBER}" \
            --job-operation-details-is-provider-upgrade-required "${UPGRADE}" \
            --wait-for-state ACCEPTED \
            --max-wait-seconds 1200 \
            --query 'data.id' \
            --raw-output)

          echo "plan_job_id=${PLAN_JOB_ID}" >> "$GITHUB_OUTPUT"
          echo "Created plan job: ${PLAN_JOB_ID}"
          # printf '%s' "${PLAN_JOB_ID}" > plan_job_id.txt



      - name: Wait for plan job result
        shell: bash
        run: |
          set -euo pipefail
          PLAN_JOB_ID="${{ steps.create_plan.outputs.plan_job_id }}"

          echo "Waiting for plan job: ${{ steps.create_plan.outputs.plan_job_id }}"

          for i in {1..120}; do
            STATUS=$(oci resource-manager job get \
              --job-id "${PLAN_JOB_ID}" \
              --query 'data."lifecycle-state"' \
              --raw-output)

            echo "Current plan status: ${STATUS}"

            if [ "${STATUS}" = "SUCCEEDED" ]; then
              echo "Plan job succeeded."
              exit 0
            elif [ "${STATUS}" = "FAILED" ] || [ "${STATUS}" = "CANCELED" ]; then
              echo "Plan job failed or was canceled."
              oci resource-manager job get --job-id "${PLAN_JOB_ID}"
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for plan job."
          exit 1

    
      - name: Save plan job id to file
        shell: bash
        run: |
          printf '%s' "${{ steps.create_plan.outputs.plan_job_id }}" > plan_job_id.txt
          test -s plan_job_id.txt
          cat plan_job_id.txt
          echo "Saved plan job id to artifact file."

      
      - name: Upload plan job id artifact      ## upload "plan-job-id" for easy to call from Apply Job ##
        uses: actions/upload-artifact@v7.0.0
        with:
          name: plan-job-id
          path: plan_job_id.txt


  apply:
    name: Manual approval and PROD Infra OCI Resource Manager Apply
    runs-on: ubuntu-latest
    needs: plan

    # This environment must be created in GitHub repo settings
    # and configured with Required reviewers for manual approval.
    environment:
      name: ${{ github.event.inputs.environment_name }}

    steps:
      - name: Install OCI CLI
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install oci-cli

      - name: Configure OCI CLI
        shell: bash
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_PRIVATE_KEY_PASSPHRASE: ${{ secrets.OCI_PRIVATE_KEY_PASSPHRASE }}
        run: |
          mkdir -p ~/.oci
          chmod 700 ~/.oci

          printf '%s\n' "${OCI_PRIVATE_KEY}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

          cat > ~/.oci/config <<EOF
          [DEFAULT]
          user=${OCI_USER_OCID}
          tenancy=${OCI_TENANCY_OCID}
          region=${OCI_REGION}
          fingerprint=${OCI_FINGERPRINT}
          pass_phrase=${OCI_PRIVATE_KEY_PASSPHRASE}
          key_file=${HOME}/.oci/oci_api_key.pem
          EOF

          chmod 600 ~/.oci/config

      - name: Download plan job id artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: plan-job-id

      - name: Read plan job id
        id: read_plan_id
        shell: bash
        run: |
          PLAN_JOB_ID="$(cat plan_job_id.txt)"
          echo "plan_job_id=${PLAN_JOB_ID}" >> "$GITHUB_OUTPUT"
          echo "Downloaded PLAN_JOB_ID=[${PLAN_JOB_ID}]"
          test -n "${PLAN_JOB_ID}"

      - name: Create apply job from approved plan
        id: create_apply
        shell: bash
        run: |
          set -euo pipefail

          STACK_ID="${{ github.event.inputs.stack_id }}"
          PLAN_JOB_ID="${{ steps.read_plan_id.outputs.plan_job_id }}"
          UPGRADE="${{ github.event.inputs.upgrade_provider }}"

          APPLY_JOB_ID=$(oci resource-manager job create-apply-job \
            --stack-id "${STACK_ID}" \
            --execution-plan-strategy FROM_PLAN_JOB_ID \
            --execution-plan-job-id "${PLAN_JOB_ID}" \
            --display-name "gha-apply-${GITHUB_RUN_NUMBER}" \
            --job-operation-details-is-provider-upgrade-required "${UPGRADE}" \
            --wait-for-state ACCEPTED \
            --max-wait-seconds 1200 \
            --query 'data.id' \
            --raw-output)

          echo "apply_job_id=${APPLY_JOB_ID}" >> "$GITHUB_OUTPUT"
          echo "Created apply job: ${APPLY_JOB_ID}"

      - name: Wait for apply job result
        shell: bash
        run: |
          set -euo pipefail
          APPLY_JOB_ID="${{ steps.create_apply.outputs.apply_job_id }}"

          echo "Waiting for apply job: ${APPLY_JOB_ID}"

          for i in {1..180}; do
            STATUS=$(oci resource-manager job get \
              --job-id "${APPLY_JOB_ID}" \
              --query 'data."lifecycle-state"' \
              --raw-output)

            echo "Current apply status: ${STATUS}"

            if [ "${STATUS}" = "SUCCEEDED" ]; then
              echo "Apply job succeeded."
              exit 0
            elif [ "${STATUS}" = "FAILED" ] || [ "${STATUS}" = "CANCELED" ]; then
              echo "Apply job failed or was canceled."
              oci resource-manager job get --job-id "${APPLY_JOB_ID}"
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for apply job."
          exit 1

      - name: Read apply outputs
        id: get_rm_outputs
        shell: bash
        env:
          APPLY_JOB_ID: ${{ steps.create_apply.outputs.apply_job_id }}
        run: |
          set -euo pipefail

          oci resource-manager job-output-summary list-job-outputs \
          --job-id "${APPLY_JOB_ID}" \
          --all \
          --output json > rm_outputs.json

          WEB_TO_DB_NPA_TEST_ID=$(jq -r '.data.items[] | select(."output-name"=="web_to_db_npa_test_id") | ."output-value"' rm_outputs.json)
          NET_COMPARTMENT_ID=$(jq -r '.data.items[] | select(."output-name"=="net_compartment_id") | ."output-value"' rm_outputs.json)

          if [ -z "${WEB_TO_DB_NPA_TEST_ID}" ]  = "null" ]; then
            echo "ERROR: output web_to_db_npa_test_id not found"
            exit 1
          fi

          if [ -z "${NET_COMPARTMENT_ID}" ] = "null" ]; then
            echo "ERROR: output net_compartment_id not found"
            exit 1
          fi

          echo "web_to_db_npa_test_id=${WEB_TO_DB_NPA_TEST_ID}" >> "$GITHUB_OUTPUT"

          echo "net_compartment_id=${NET_COMPARTMENT_ID}" >> "$GITHUB_OUTPUT"

          echo "net_compartment_id=${NET_COMPARTMENT_ID}" >> "$GITHUB_ENV"

      - name: Run web-to-db subnet connectivity check
        shell: bash
        env:
          WEB_TO_DB_NPA_TEST_ID: ${{ steps.get_rm_outputs.outputs.web_to_db_npa_test_id }}
          OCI_COMPARTMENT_OCID: ${{ steps.get_rm_outputs.outputs.net_compartment_id }}
          SUPPRESS_LABEL_WARNING: "True"
        run: |
          set -euo pipefail

          echo "Running saved NPA test: ${WEB_TO_DB_NPA_TEST_ID}"
          

          oci vn-monitoring path-analysis get-path-analysis-persisted \
            --path-analyzer-test-id "${WEB_TO_DB_NPA_TEST_ID}" \
            --wait-for-state SUCCEEDED \
            --wait-for-state FAILED \
            --max-wait-seconds 900 \
            --output json > path_run.json

          
          WR_ID=$(oci vn-monitoring work-request list \
            --compartment-id "${OCI_COMPARTMENT_OCID}" \
            --resource-id "${WEB_TO_DB_NPA_TEST_ID}" \
            # --sort-by timeAccepted \
            # --sort-order DESC \
            --all \
            --query 'data.items[0].status' \
            --raw-output)

          
          if [ -z "${WR_ID}" ] || [ "${WR_ID}" = "null" ]; then
            echo "ERROR: no VN Monitoring work request found in compartment"
            exit 1
          fi
          
          echo "Work request ID: ${WR_ID}"

          WR_STATUS=$(oci vn-monitoring work-request get \
            --work-request-id "${WR_ID}" \
            --query 'data.status' \
            --raw-output)

          echo "Work request status: ${WR_STATUS}"


          if [ "${WR_STATUS}" != "SUCCEEDED" ]; then
            echo "ERROR: path analysis failed"
            oci vn-monitoring work-request-error list \
              --work-request-id "${WR_ID}" \
              --output json || true
            exit 1
          fi



          oci vn-monitoring work-request-result list \
            --work-request-id "${WR_ID}"\
            --all \
            --result-type PATH_ANALYSIS \
            --output json > path_result.json

          echo "Reachability statuses:"
          
          jq -r '.. | .reachabilityStatus? // empty' path_result.json | sort -u


          if jq -e '
            [.. | .reachabilityStatus? // empty] as $s
            | ($s | length) > 0 and ($s | all(. == "REACHABLE"))
          ' path_result.json > /dev/null; then
            echo "REACHABLE"
          else
            echo "UNREACHABLE"
            jq -r '.. | .routeAnalysisDescription? // empty' path_result.json || true
          fi


          # echo "Work request ID: ${WR_ID}"


